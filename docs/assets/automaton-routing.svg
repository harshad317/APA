<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Four-state APA routing topology</title>
  <desc id="desc">A routing graph showing the start, decompose, verify, and terminal states with guard conditions.</desc>
  <defs>
    <style>
      .bg { fill: #fbfdff; }
      .state { fill: #ffffff; stroke: #334155; stroke-width: 2.2; rx: 16; }
      .start { fill: #e0f2fe; stroke: #0284c7; }
      .decompose { fill: #ecfdf5; stroke: #059669; }
      .verify { fill: #fff7ed; stroke: #ea580c; }
      .terminal { fill: #fef2f2; stroke: #dc2626; }
      .text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .title { font-size: 24px; font-weight: 750; }
      .subtitle { font-size: 15px; fill: #475569; }
      .label { font-size: 21px; font-weight: 750; }
      .small { font-size: 13px; fill: #475569; }
      .guard { font-size: 13px; font-weight: 650; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #64748b; stroke-width: 2.1; fill: none; marker-end: url(#arrowheadSoft); }
      .pill { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 10; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#334155" />
    </marker>
    <marker id="arrowheadSoft" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L10,4 L0,8 Z" fill="#64748b" />
    </marker>
  </defs>

  <rect class="bg" width="1120" height="520" />
  <text x="56" y="54" class="text title">Default Four-State Routing Policy</text>
  <text x="56" y="82" class="text subtitle">The first satisfied guard wins, ordered by transition priority.</text>

  <rect x="70" y="200" width="190" height="106" class="state start" />
  <text x="136" y="238" class="text label">Start</text>
  <text x="104" y="266" class="text small">Direct answer prompt</text>
  <text x="102" y="286" class="text small">Carries response context</text>

  <rect x="465" y="96" width="210" height="112" class="state decompose" />
  <text x="512" y="138" class="text label">Decompose</text>
  <text x="505" y="166" class="text small">Breaks complex input</text>
  <text x="498" y="186" class="text small">into sub-problems</text>

  <rect x="465" y="310" width="210" height="112" class="state verify" />
  <text x="520" y="352" class="text label">Verify</text>
  <text x="503" y="380" class="text small">Checks prior answer</text>
  <text x="501" y="400" class="text small">and corrects errors</text>

  <rect x="865" y="200" width="190" height="106" class="state terminal" />
  <text x="914" y="238" class="text label">Terminal</text>
  <text x="900" y="266" class="text small">Final concise answer</text>
  <text x="895" y="286" class="text small">Episode ends cleanly</text>

  <path d="M260 226 C342 180, 374 150, 465 150" class="arrow" />
  <rect x="294" y="154" width="150" height="34" class="pill" />
  <text x="312" y="176" class="text guard">is_long_input &gt; 0.5</text>

  <path d="M260 279 C346 340, 374 366, 465 366" class="arrow" />
  <rect x="288" y="333" width="164" height="34" class="pill" />
  <text x="302" y="355" class="text guard">uncertainty &gt; 0.30</text>

  <path d="M260 253 L865 253" class="arrow2" />
  <rect x="480" y="236" width="178" height="34" class="pill" />
  <text x="496" y="258" class="text guard">confidence &gt;= 0.70</text>

  <path d="M675 152 C772 148, 807 188, 865 222" class="arrow2" />
  <rect x="716" y="151" width="116" height="34" class="pill" />
  <text x="741" y="173" class="text guard">always</text>

  <path d="M675 360 C779 352, 812 310, 865 278" class="arrow" />
  <rect x="724" y="322" width="116" height="34" class="pill" />
  <text x="749" y="344" class="text guard">always</text>

  <path d="M570 208 L570 310" class="arrow" />
  <rect x="588" y="242" width="164" height="34" class="pill" />
  <text x="601" y="264" class="text guard">uncertainty &gt; 0.35</text>

  <rect x="88" y="398" width="942" height="62" class="pill" />
  <text x="113" y="425" class="text small">Runtime loop: render state template -> call LLM -> extract features -> test guards by priority -> move to the next state.</text>
  <text x="113" y="445" class="text small">Safety stops: terminal state, no transition, max steps, or max LLM-call budget.</text>
</svg>
